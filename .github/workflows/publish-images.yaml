name: Publish images

# Build the portal frontend + backend images and push them to GHCR so the
# cluster pulls pre-built images instead of building on the server.
# Tags: branch name, short SHA, and the git tag on release.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: portal-frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            target: prod
          # portal-api is an overlay on the pinned upstream image (its uv.lock
          # drifts from pyproject, so a source build fails); see
          # backend/Dockerfile.overlay.
          - image: portal-api
            context: ./backend
            file: ./backend/Dockerfile.overlay
            target: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/open-suite/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
