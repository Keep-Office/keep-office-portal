server {
    listen       8080;
    server_name  localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed build assets never change — cache them hard.
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        # Don't let the browser pin an old bundle: revalidate HTML each load so
        # new deploys are picked up without a manual hard refresh.
        add_header Cache-Control "no-cache";
        # Next static export writes each route as "<route>.html". Try the
        # exact file, then "<route>.html" (so external hits like
        # /matrix-callback resolve), then SPA fallback.
        try_files $uri $uri.html $uri/index.html /index.html;
    }


    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    absolute_redirect off;
}
